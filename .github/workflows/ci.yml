name: Python CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest coverage safety
        if [ -f bot-manager/bot-engine/requirements.txt ]; then pip install -r bot-manager/bot-engine/requirements.txt; fi
        if [ -f api-fundacion-idear-webhook/requirements.txt ]; then pip install -r api-fundacion-idear-webhook/requirements.txt; fi

    - name: Security check (Safety)
      run: |
        safety check --full-report || true

    - name: Lint with flake8
      run: |
        TARGET_FOLDERS="bot-manager api-fundacion-idear-webhook"
        # Errores críticos (detienen el pipeline)
        flake8 $TARGET_FOLDERS --count --select=E9,F63,F7,F82 --show-source --statistics
        # Estilo y complejidad (solo warnings)
        flake8 $TARGET_FOLDERS --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Run tests with coverage
      run: |
        coverage run -m pytest
        coverage report -m
        coverage xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true

    - name: Build package (sanity check)
      run: |
        python setup.py sdist bdist_wheel || echo "No setup.py, skipping build"

    - name: Artifact upload (dist)
      uses: actions/upload-artifact@v4
      with:
        name: python-dist
        path: dist/
