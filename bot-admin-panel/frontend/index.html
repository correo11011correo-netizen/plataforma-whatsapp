<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta tags para evitar caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Dashboard - Bots</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260310_1">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar con la lista de bots y chats -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Selector de Bot</h2>
                <select id="bot-selector-main" class="bot-dropdown">
                    <option value="default">Fundación IDEAR Principal</option>
                    <!-- Aquí se añadirían más bots en el futuro -->
                </select>
            </div>
            <div class="sidebar-chats-header">
                <h3>Chats Recientes</h3>
            </div>
            <ul id="chat-list">
                <!-- La lista de chats se cargará aquí -->
            </ul>
        </aside>

        <!-- Vista del chat -->
        <main class="chat-view hidden" id="chat-view">
            <div class="chat-header">
                <button id="back-btn" class="back-btn hidden"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-header-info">
                    <h3 id="chat-header-name">Nombre del contacto</h3>
                    <span id="chat-header-phone">Teléfono</span>
                </div>
                <div class="chat-controls">
                    <button id="human-toggle">Modo Humano</button>
                    <button id="delete-chat-btn" title="Borrar Conversación"><i class="fas fa-trash"></i></button>
                </div>
            </div>
            <div class="messages-container" id="messages-container">
                <!-- Mensajes -->
            </div>
            <div class="message-input">
                <input type="file" id="media-upload-input" accept="image/*,video/*,application/pdf" style="display: none;">
                <button id="attach-btn" title="Adjuntar Archivo"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="message-input-text" placeholder="Escribe tu mensaje..." autocomplete="off">
                <button id="send-message-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </main>
        
        <!-- Pantalla de bienvenida en PC cuando no hay chat seleccionado -->
        <main class="welcome-view" id="welcome-view">
            <div class="welcome-content">
                <i class="fas fa-robot"></i>
                <h2>Selecciona un chat para comenzar</h2>
                <p>Elige una conversación del panel lateral para ver los mensajes o intervenir.</p>
            </div>
        </main>
    </div>

    <script src="script.js?v=20260310_MEDIA"></script>
</body>
</html>
